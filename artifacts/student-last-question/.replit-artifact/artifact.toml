kind = "web"
previewPath = "/"
title = "Student Last Question"
version = "1.0.0"
id = "artifacts/student-last-question"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22945

[services.development]
run = "pnpm --filter @workspace/student-last-question run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/student-last-question", "run", "build" ]
publicDir = "artifacts/student-last-question/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22945"
BASE_PATH = "/"
